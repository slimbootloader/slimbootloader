  # GPP_D (Community: 0, group: 1)
  - $ACTION      :
      page         : GIO_GPP_D:GIO:"GPIO GPP_D"
  - !expand { GPIO_TMPL : [ GPP_D,  00, 0x00000000,  0x00200000 ] }
