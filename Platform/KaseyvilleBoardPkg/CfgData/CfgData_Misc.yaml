- $ACTION      :
    page         : MSC
- MISC_CFG_DATA :
  - !expand { CFGHDR_TMPL : [ MISC_CFG_DATA, 0x900, 0, 0 ] }
  - !expand { MSC_TMPL : [ General ] }
  - MiscCfg :
    - $STRUCT      :
        name         : Misc Config
        help         : >
                       Configure multiple settings
        struct       : MISC_CFG
    - HyperThreading :
        name         : Processor HyperThreading Function
        help         : >
                       Enables Logical processor, 0- ALL LPs, 1- Single LP, 2- Two LPs
        type         : Combo
        option       : 0:ALL LPs, 1:Single LP, 2:Two LPs
        length       : 2b
        value        : 0
    - FspDebugPrintErrorLevel :
        name         : UPI Debug Print Level
        type         : Combo
        option       : 1:Fatal, 2:Warning, 4:Summary, 8:Detail, 0x0F:All
        help         : >
                       UPI Debug Print Level Bitmask. 0- Disable, 1- Fatal, 2- Warning, 4- Summary, 8- Detail, <b>0xF- All(Default)</b>
        length       : 4b
        value        : 0x0F
    - Reserved0    :
        name         : Reserved0
        type         : Reserved
        help         : >
                       reserved
        length       : 26b
  - !expand { MSC_TMPL : [ VtdConfig ] }
  - VtdConfig :
    - $STRUCT      :
        name         : VT-D Configuration
        help         : >
                       Configure Vtd
        struct       : VtdConfig
    - DmaCtrlOptIn :
        name         : DMA Control Opt-In
        type         : Combo
        option       : 0:Disabled,1:Enabled
        help         : >
                       Enable/Disable DMA Control Opt-In.
        length       : 0x01
        value        : 0
    - InterruptRemap :
        name         : Interrupt Remapping
        type         : Combo
        option       : 0:Disabled,1:Enabled
        help         : >
                       Enable VTd Interrupt Remapping support.
        length       : 0x01
        value        : 0x01
    - RhsaSupport :
        name         : RHSA Support
        type         : Combo
        option       : 0:Disabled,1:Enabled
        help         : >
                       Enable or Disable RHSA support.
        length       : 0x01
        value        : 0x01
    - SatcSupport :
        name         : SATC Support
        type         : Combo
        option       : 0:Disabled,1:Enabled
        help         : >
                       Enable or Disable SATC support.
        length       : 0x01
        value        : 0x01
    - SidpSupport :
        name         : SIDP Support
        type         : Combo
        option       : 0:Disabled,1:Enabled
        help         : >
                       Enable or Disable SIDP support.
        length       : 0x01
        value        : 0x01
    - Reserved1    :
        name         : Reserved0
        type         : Reserved
        help         : >
                       reserved
        length       : 0b
