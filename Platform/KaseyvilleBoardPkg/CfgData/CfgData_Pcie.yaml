  - IIoPcieHotPlugEnable :
      name         : IIO PCIe Hot Plug
      type         : Combo
      option       : 0:Disable, 1:Enable
      help         : >
                      Enable/Disable PCIe Hot Plug globally.
      length       : 0x01
      condition    : $(COND_IIO_PCIE_HP_EN)
      value        : 0x00
  - IIoPcieHotPlugOnPortPtr :
      name         : IIO Hot Plug Capable Array Ptr
      type         : EditNum, HEX, (0x00000000,0xFFFFFFFF)
      help         : >
                      Pointer to array of Hot Plug Capable
      length       : 0x04
      value        : 0x00
  - PcieHotPlugOnPortNumber :
      name         : IIO Hot Plug Capable Number
      type         : EditNum, HEX, (0x00000000,0xFFFFFFFF)
      help         : >
                      Number of elements in Hot Plug Capable array.
      length       : 0x04
      value        : 0x00000000
  - DeEmphasisPtr :
      name         : IIO DeEmphasis Array Ptr
      type         : EditNum, HEX, (0x00000000,0xFFFFFFFF)
      help         : >
                      Pointer to array of DeEmphasis
      length       : 0x04
      value        : 0x00
  - DeEmphasisNumber :
      name         : IIO DeEmphasis Array Number
      type         : EditNum, HEX, (0x00000000,0xFFFFFFFF)
      help         : >
                      Number of elements in DeEmphasis array.
      length       : 0x04
      value        : 0x00000000
  - PcieAspmPtr :
      name         : IIO ASPM Support Array Ptr
      type         : EditNum, HEX, (0x00000000,0xFFFFFFFF)
      help         : >
                      Pointer to array of ASPM Support
      length       : 0x04
      value        : 0x00
  - PcieAspmNumber :
      name         : IIO ASPM Support Array Number
      type         : EditNum, HEX, (0x00000000,0xFFFFFFFF)
      help         : >
                      Number of elements in ASPM Support array.
      length       : 0x04
      value        : 0x00000000
  - PcieAerCorrErrEn :
      name         : PCIE AER Corrected Errors
      type         : Combo
      option       : 0:Disable, 1:Enable
      help         : >
                      Enable or Disable PCIE AER Corrected Errors
      length       : 0x01
      value        : 0x01
  - PcieAerEcrcEn :
      name         : PCIE ECRC Error
      type         : Combo
      option       : 0:Disable, 1:Enable
      help         : >
                      Enable/Disable PCIE ECRC Error
      length       : 0x01
      value        : 0x00
  - PcieGlobalAspm :
      name         : ASPM Support (Global)
      type         : Combo
      option       : 0:Disable, 1:Per-Port
      help         : >
                      This option can disable ASPM support for all PCIe root ports.
      length       : 0x01
      value        : 0x01
  - DelayAfterPCIeLinkTraining :
      name         : DelayAfterPCIeLinkTraining
      type         : EditNum, HEX, (0x0000,0xFFFF)
      help         : >
                      Custom delay after PCI-E link training on IIO ports
      length       : 0x02
      value        : 0x00
  - DfxEvMode :
      name         : DFX Ev Mode
      type         : Combo
      option       : 0:Disable, 1:Enable
      help         : >
                      When Enabled, Expose IIO DFX devices and other CPU devices like PMON in FSP
      length       : 0x01
      value        : 0x00
  - DfxAdvDebugJumper :
      name         : Advanced Debug Function
      type         : Combo
      option       : 0:Disable, 1:Enable, 2:Auto
      help         : >
                      Select Advanced Debug Function, 0- Disable, 1- Enable, 2- Auto
      length       : 0x01
      value        : 0x02
  - PcieCommonClockNumber :
      name         : IIO PCIe Common Clock Array Number
      type         : EditNum, HEX, (0x00000000,0xFFFFFFFF)
      help         : >
                      Number of elements in PCIe Common Clock array.
      length       : 0x04
      value        : 0x00000000
  - DfxCxlDebugModeNumber :
      name         : DfxCxl Debug Mode Number
      type         : EditNum, HEX, (0x00000000,0xFFFFFFFF)
      length       : 0x04
      value        : 0x00
  - Gen5LinkDegradation :
      name         : Gen5LinkDegradation
      type         : Combo
      option       : 0:Disable, 1:Enable
      help         : >
                      Enable or disable Gen5 link degradation.
      length       : 0x01
      value        : 0x01
  - MemIOLoopCount :
      name         : Memory I/O Health Check Loop Count
      type         : EditNum, HEX, (0x00,0xFF)
      help         : >
                      CPGC Test Loop Count for Memory IO Health Test.
      length       : 0x01
      value        : 0x10
  - !expand { PCI_TMPL : [ PCH_RP ] }
  - PchRpConfig :
    - $STRUCT      :
        name         : Pcie Rp Configuration
        help         : >
                       Configure Pcie Root Port
        struct       : PCH_RP_CFG
    - PcieRootPortDeEmphasis :
        name         : PCIe Root Port DeEmphasis
        type         : EditNum, HEX, (0x00,0xFF)
        option       : 0:6dB, 1:3.5dB
        help         : >
                        Desired DeEmphasis level for PCIE root port ( 0 - 7 )
        length       : 0x08
        value        : {0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00}
    - PcieRootPortAspm :
        name         : PCIe Root Port ASPM Support
        type         : EditNum, HEX, (0x00,0xFF)
        option       : 0:Disable, 4:Auto
        help         : >
                        This option can disable ASPM support in PCIe root ports ( 0 - 7). 'Auto' keeps hardware default.
        length       : 0x08
        value        : {0x04, 0x04, 0x04, 0x04, 0x04, 0x00, 0x00, 0x00}
    - PcieRootPortHotPlugOnPort :
        name         : PCIe Root Port Hot Plug Capable
        type         : EditNum, HEX, (0x00,0xFF)
        option       : 0:Disable, 1:Enable, 2:Auto
        help         : >
                        This option specifies if the link is considered Hot Plug capable.
        length       : 0x08
        value        : {0x02, 0x02, 0x02, 0x02, 0x02, 0x02, 0x02, 0x02}
    - PtmEnable      :
        name         : PTM Support
        type         : Combo
        option       : 0:Disable, 2:Auto
        help         : >
                        Enable PTM capability
        length       : 0x01
        value        : 0x02
