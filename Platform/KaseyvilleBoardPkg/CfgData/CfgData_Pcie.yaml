- $ACTION      :
    page         : PCI
- PCIE_CFG_DATA :
  - !expand { CFGHDR_TMPL : [ PCIE_CFG_DATA, 0xA00, 0, 0 ] }
  - !expand { PCI_TMPL : [ IIO_RP ] }
  - IioPE0Bifurcation :
      name         : IIO IioPE0Bifurcation
      type         : EditNum, HEX, (0x00,0xFFFFFFFFFFFFFFFF)
      help         : >
                      IioPE0Bifurcation[MAX_SOCKET]- MAX_SOCKET=8, 0x00:x4x4x4x4, 0x01:x4x4xxx8, 0x02:xxx8x4x4, 0x03:xxx8xxx8, 0x04:xxxxxx16, <b>0xFF:AUTO(Default)</b>
      option       : 0xFF:Auto, 0:X4X4X4X4, 1:x4x4xxx8, 2:xxx8x4x4, 3:xxx8xxx8, 4:xxxxxx16
      length       : 0x08
      value        : {0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF}
